<title>星星的密室日常活动——百币英雄</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:PingFang SC,Microsoft YaHei,sans-serif}
body{background:#0b0f1e;color:#fff}
.main{max-width:700px;margin:0 auto;padding:20px;min-height:100vh}

/* 公告样式 */
.notice{
  background:#1a223a;
  border-left:4px solid #ffc107;
  padding:12px 16px;
  border-radius:10px;
  margin-bottom:16px;
  font-size:15px;
  line-height:1.5;
}
.notice-time{
  color:#ffde55;
  font-weight:bold;
  margin-right:8px;
}

/* 排行榜样式 */
.rank-box{
  background:#12172b;
  border-radius:16px;
  padding:20px;
  margin-top:20px;
}
.rank-box h3{
  color:#f9e488;
  font-size:18px;
  margin-bottom:14px;
  text-align:center;
}
.rank-item{
  display:flex;
  align-items:center;
  padding:10px 12px;
  background:#1b223a;
  border-radius:10px;
  margin-bottom:8px;
  font-size:15px;
}
.rank-no{
  width:32px;height:32px;
  background:#ff4380;color:#fff;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:bold;margin-right:12px;
}
.rank-name{flex:1;}
.rank-score{margin-right:12px;font-weight:bold;color:#ffde55;}
.rank-revive{color:#ccc;font-size:13px;}

/* 底部周期主题 */
.period-theme{
  margin-top:30px;
  padding:16px;
  background:#12172b;
  border-radius:12px;
  text-align:center;
  font-size:15px;
  line-height:1.7;
}
.period-theme strong{color:#f9e488;}
.theme-content{color:#c0c8e7;margin-top:4px;}

.game{display:none;background:#0b0f1e;position:relative}
.competition-mode .game{
  display:block;
  background: linear-gradient(90deg, #ffc107 0%, #ffc107 50%, #9c27b0 50%, #9c27b0 100%);
}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 0}
.user-text{color:#a0a8c8;font-size:15px}
.life{color:#ffde55}
.count-down{font-size:22px;font-weight:700;color:#ffde55}
.race-tag{
  background:#ff4380;color:#fff;padding:4px 10px;border-radius:8px;font-size:14px;font-weight:bold;
}
.progress-bar{width:100%;height:8px;background:#1e253e;border-radius:4px;margin:10px 0;overflow:hidden}
.progress-line{height:100%;background:linear-gradient(90deg,#ff4380,#fa7250);width:100%;transition:.1s linear}
.question-box{background:#12172b;border-radius:20px;padding:28px;margin-top:10px}
.question-title{font-size:20px;line-height:1.6;margin-bottom:24px;color:#f0f4ff}
.option{background:#1b223a;border-radius:14px;padding:18px 16px;margin-bottom:12px;font-size:16px;cursor:pointer}
.option.selected{background:#293557}
.option.right{background:#1a6c38}
.option.wrong{background:#7a2c2c}
.option.mask{pointer-events:none}
.login{background:#12172b;border-radius:20px;padding:40px;margin-top:30px;border:1px solid #273050}
.login h2{text-align:center;font-size:24px;color:#f9e488;margin-bottom:26px}
.login input{width:100%;height:50px;background:#1b223a;border:none;border-radius:12px;color:#fff;padding:0 16px;font-size:16px;margin-bottom:14px}
.login button{width:100%;height:52px;background:linear-gradient(90deg,#6250ff,#8a7aff);border:none;border-radius:12px;color:#fff;font-size:17px;font-weight:700}
.tip{text-align:center;color:#ff5555;margin-top:12px;font-size:14px}
.time-info{text-align:center;margin-top:20px;font-size:15px;color:#c0c8e7}

.admin{display:none;background:#12172b;border-radius:20px;padding:30px;margin-top:20px}
.admin h3{color:#f9e488;margin-bottom:15px}
.admin textarea{width:100%;height:160px;background:#1b223a;color:#fff;border-radius:8px;padding:10px;font-size:14px;margin-bottom:10px}
.admin input.theme-input{
  width:100%;height:46px;background:#1b223a;color:#fff;border-radius:8px;padding:0 12px;margin-bottom:10px;
  border:none;font-size:15px;
}
.admin button{background:#6250ff;color:#fff;border:none;border-radius:10px;padding:10px 16px;margin-right:10px;margin-bottom:10px}
.admin .account-item{padding:10px 14px;background:#1b223a;border-radius:8px;margin-bottom:8px;cursor:pointer}
.admin .account-item:hover{background:#253252}

.end{display:none;text-align:center;background:#12172b;border-radius:20px;padding:40px;margin-top:20px}
.end h2{font-size:26px;color:#f9e488;margin-bottom:20px}
.end p{color:#c0c8e7;font-size:16px;margin:6px 0}
.end .final{color:#ffde55;font-size:18px;margin:20px 0}
.end .race-auth{
  display:inline-block;background:#ffc107;color:#000;padding:6px 14px;border-radius:10px;font-weight:bold;margin-top:10px;

.end button{background:linear-gradient(90deg,#ff4380,#fa7250);border:none;border-radius:14px;color:#fff;padding:14px 32px;font-size:16px;margin-top:10px}
</style>

// 计算本周五～周日日期
function getThisWeekFriToSun() {
  const now = new Date();
  const day = now.getDay();
  const diffToFri = (5 - day + 7) % 7;
  const fri = new Date(now);
  fri.setDate(now.getDate() + diffToFri);
  const sun = new Date(fri);
  sun.setDate(fri.getDate() + 2);

  function fmt(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const d_ = String(d.getDate()).padStart(2, '0');
    return `${y}年${m}月${d_}日`;
  }
  return `${fmt(fri)}～${fmt(sun)}`;
}

function saveRaceScore(period, name, score, usedRevive) {
  let board = getRaceScores();
  if (!board[period]) board[period] = [];
  let list = board[period];
  let idx = list.findIndex(x => x.name === name);
  if (idx >= 0) {
    if (score > list[idx].score) list[idx] = {name, score, usedRevive};
  } else {
    list.push({name, score, usedRevive});
  }
  list.sort((a,b)=>b.score - a.score);
  board[period] = list;
  localStorage.setItem('raceScoreBoard', JSON.stringify(board));
}

function fmtDate(d) {
  const year = d.getFullYear();
  const month = String(d.getMonth()+1).padStart(2,'0');
  const date = String(d.getDate()).padStart(2,'0');
  const w = ['日','一','二','三','四','五','六'][d.getDay()];
  return `${year}年${month}月${date}日 周${w}`;
}

function getPeriodInfo() {
  const now = new Date();
  const day = now.getDay();
  const h = now.getHours();
  const dateStr = fmtDate(now);
  let allowed = false;
  let periodName = '';
  if (day === 5) {
    if (h >= 6 && h < 20) { allowed = true; periodName = `${dateStr} 06:00~20:00场`; }
    else if (h >= 20 && h < 24) { allowed = true; periodName = `${dateStr} 20:00~24:00场`; }
  } else if (day === 6 || day === 0) {
    if (h >= 8 && h < 12) { allowed = true; periodName = `${dateStr} 08:00~12:00场`; }
    else if (h >= 12 && h < 16) { allowed = true; periodName = `${dateStr} 12:00~16:00场`; }
    else if (h >= 16 && h < 20) { allowed = true; periodName = `${dateStr} 16:00~20:00场`; }
    else if (h >= 20 && h < 24) { allowed = true; periodName = `${dateStr} 20:00~24:00场`; }
  }
  return { allowed, periodName };
}

// 复活卡校验
function checkAndConsumeCode(code) {
  const cleanCode = code.trim().toLowerCase();
  if (cleanCode === UNLIMITED_CODE.toLowerCase()) return true;
  if (!SINGLE_USE_CODES.has(cleanCode)) return false;
  if (usedCodes.includes(cleanCode)) return false;
  usedCodes.push(cleanCode);
  localStorage.setItem('usedReviveCodes', JSON.stringify(usedCodes));
  return true;
}

    if (usedFixedAccounts[pwd] === currentKey) {
      let name = RACE_FIXED[pwd] || pwd;
      list.push({ pwd, name });
    }
  }
  if (list.length === 0) {
    container.innerHTML = '<div class="account-item">本场暂无使用账号</div>';
    return;
  }
  list.forEach(item => {
    let div = document.createElement('div');
    div.className = 'account-item';
    div.innerText = `账号：${item.name}`;
    div.onclick = () => {
      delete usedFixedAccounts[item.pwd];
      localStorage.setItem('usedRaceAccounts', JSON.stringify(usedFixedAccounts));
      alert(`已重置：${item.name}，可重新参赛`);
      showResetRacePanel();
    };
    container.appendChild(div);
  });
}

function saveQuestions() {
  try {
    BANK = JSON.parse($('questionEditor').value);
    alert('题库保存成功！');
  } catch(e) {
    alert('JSON格式错误，请检查！');
  }
}

function login() {
  const userInput = $('username').value.trim();
  const pwd = $('pwd').value.trim();
  const reviveInput = $('reviveCode').value.trim();
  $('loginTip').innerText = '';
  if (!pwd) { $('loginTip').innerText = '请输入活动密码'; return; }

  currentUser = userInput;
  isRaceMode = false;
  racePeriodText = '';
  isCompetitionAccount = isCompetitionPassword(pwd);
  usedReviveInGame = false;

  if (pwd === ADMIN_PWD) {
    $('loginBox').style.display = 'none';
    $('adminPanel').style.display = 'block';
    showAdminMenu();
    return;
  }

  const isRacePwd = isCompetitionPassword(pwd);
  if (isRacePwd) {
    const pi = getPeriodInfo();
    if (!pi.allowed) { $('loginTip').innerText = '当前非比赛时间，无法进入'; return; }
    isRaceMode = true;
    racePeriodText = pi.periodName;

    if (pwd in RACE_FIXED) {
      const key = pi.periodName;
      if (isFixedAccountUsed(pwd, key)) { $('loginTip').innerText = '该账号本场次已使用过'; return; }
      currentUser = RACE_FIXED[pwd];
      markFixedAccountUsed(pwd, key);
    }
  } else {
    if (!(pwd in OLD_PASSWORDS) && !(pwd in UNLIMITED_PASS)) { $('loginTip').innerText = '密码不正确'; return; }
  }

  if (isRaceMode) {
    life = checkAndConsumeCode(reviveInput) ? 1 : 0;
  } else {
    life = 1;
  }

  startGame();
}

function startGame() {
  $('loginBox').style.display = 'none';
  $('adminPanel').style.display = 'none';
  $('endBox').style.display = 'none';
  $('gameBox').style.display = 'block';
  
  if (isRaceMode) {
    document.body.classList.add('competition-mode');
    $('raceTag').style.display = 'inline-block';
  } else {
    document.body.classList.remove('competition-mode');
    $('raceTag').style.display = 'none';
  }

  $('userInfo').innerText = `玩家：${currentUser}`;
  correct = 0; currentQ = 0;
  questionList = shuffle([...BANK]).slice(0, 12);
  showQuestion();
}

function goBack() {
  clearInterval(timer);
  $('gameBox').style.display = 'none';
  $('endBox').style.display = 'none';
  $('adminPanel').style.display = 'none';
  $('loginBox').style.display = 'block';
  document.body.classList.remove('competition-mode');
  updateTimeDisplay();
  renderRank();
}

function showQuestion() {
  if (currentQ >= questionList.length) { showEnd('挑战完成'); return; }
  selected = -1;
  remain = ANSWER_TIME;
  const q = questionList[currentQ];
  $('question').innerText = `${currentQ+1}. ${q.q}`;
  const opts = document.querySelectorAll('.option');
  opts.forEach((el,i)=>{ el.innerText = q.o[i]; el.classList.remove('selected','right','wrong','mask'); });
  updateCount();
  clearInterval(timer);
  timer = setInterval(()=>{
    remain--; updateCount();
    if (remain <= 0) { clearInterval(timer); judge(); }
  },1000);
}

function updateCount() {
  $('countDown').innerText = remain;
  $('progress').style.width = (remain/ANSWER_TIME*100)+'%';
  $('lifeInfo').innerText = `复活卡：${life}`;
}

function pick(idx) {
  if (selected !== -1) return;
  selected = idx;
  const opts = document.querySelectorAll('.option');
  opts.forEach(el=>el.classList.remove('selected'));
  opts[idx].classList.add('selected');
}

function judge() {
  const q = questionList[currentQ];
  const opts = document.querySelectorAll('.option');
  opts.forEach(el=>el.classList.add('mask'));
  let isCorrect = false;
  if (selected === q.a) {
    opts[selected].classList.add('right'); correct++; isCorrect = true;
  } else {
    if (selected !== -1) opts[selected].classList.add('wrong');
    opts[q.a].classList.add('right');
  }
  setTimeout(()=>{
    if (isCorrect) {
      currentQ++;
      showQuestion();
    } else {
      if (life > 0) {
        life--;
        usedReviveInGame = true;
        currentQ++;
        showQuestion();
      } else {
        showEnd('挑战失败');
      }
    }
  }, JUDGE_DELAY);
}

function showEnd(title) {
  clearInterval(timer);
  $('gameBox').style.display = 'none';
  $('endBox').style.display = 'block';
  $('endTitle').innerText = title;
  $('sName').innerText = currentUser;
  $('sCorrect').innerText = correct;

  if (isRaceMode && racePeriodText) {
    $('racePeriodTip').innerText = `参赛时段：${racePeriodText}`;
    saveRaceScore(racePeriodText, currentUser, correct, usedReviveInGame);
  } else {
    $('racePeriodTip').innerText = '';
  }

  if (isRaceMode) {
    $('raceAuth').style.display = 'inline-block';
    $('raceAuth').innerText = '比赛模式认证';
  } else {
    $('raceAuth').style.display = 'none';
  }

  let finalText;
  if (correct >= 12) {
    finalText = "请截图给景晨";
  } else if (correct >= 10) {
    finalText = "优秀！";
  } else if (correct >= 6) {
    finalText = "不错！";
  } else {
    finalText = "加油！";
  }
  $('sFinal').innerText = finalText;
}

function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

// 初始化
updateTimeDisplay();
renderNotice();
renderTheme();
renderRank();
</script>
</body>
</html>
