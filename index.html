body{background:#0b0b1e;color:#fff}
.main{max-width:700px;margin:0 auto;padding:20px;min-height:100vh}
.game{display:none;background:#0b0b1e;position:relative}
.competition-mode .game{

  background: linear-gradient(90deg, #ffc107 0%, #ffc107 50%, #9c27b0 50%, #9c27b0 100%);
}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 0}
.user-text{color:#aab8c7;font-size:15px}
.life{color:#ffde55}
.count-down{font-size:22px;font-weight:700;color:#ffde55}
.race-tag{

}
.progress-bar{width:100%;height:8px;background:#1e253e;border-radius:4px;margin:10px 0;overflow:hidden}
.progress-line{height:100%;background:linear-gradient(90deg,#ff4380,#fa7250);width:100%;transition:.1s linear}
.question-box{background:#12172b;border-radius:20px;padding:28px;margin-top:10px}
.question-title{font-size:20px;line-height:1.6;margin-bottom:24px;color:#f0f4ff}
.option{background:#1b223a;border-radius:14px;padding:18px 16px;margin-bottom:12px;font-size:16px;cursor:pointer}
.option.selected{background:#293557}
.option.right{background:#1a6c38}
.option.wrong{background:#7a2c2c}
.option.mask{pointer-events:none}

.login{background:#12172b;border-radius:20px;padding:40px;margin-top:30px;border:1px solid #273050}
.login h2{text-align:center;font-size:24px;color:#f9e488;margin-bottom:26px}
.login input{width:100%;height:50px;background:#1b223a;border:none;border-radius:12px;color:#fff;padding:0 16px;font-size:16px;margin-bottom:14px}
.login button{width:100%;height:52px;background:linear-gradient(90deg,#6250ff,#8a7aff);border:none;border-radius:12px;color:#fff;font-size:17px;font-weight:700}
.tip{text-align:center;color:#ff5555;margin-top:12px;font-size:14px}
.time-info{text-align:center;margin-top:20px;font-size:15px;color:#c0c8e7}

/* 主页排行榜 */

  background:#12172b; border-radius:16px; padding:20px; margin-top:24px;
}
.rank-container h3{
  color:#ffde55; text-align:center; margin-bottom:14px; font-size:18px;
}
.rank-list{
  display:flex; flex-direction:column; gap:8px;
}
.rank-item{

}
.rank-num{
  width:32px; font-weight:bold; color:#ff9500;
}
.rank-name{
  flex:1; text-align:left;
}
.rank-score{
  color:#ffde55; font-weight:bold;

.admin h3{color:#f9e488;margin-bottom:15px}

    </div>

    <div id="resetRaceSection" style="display:none">

      <button onclick="backToAdminMenu()">返回</button>

    </div>
  </div>

    <p>昵称：<span id="sName"></span></p>
    <p>答对题数：<span id="sCorrect"></span></p>

// 格式化时间
function fmtDate(d) {
  const year = d.getFullYear();
  const month = String(d.getMonth()+1).padStart(2,'0');
  const date = String(d.getDate()).padStart(2,'0');
  const w = ['日','一','二','三','四','五','六'][d.getDay()];
  return `${year}年${month}月${date}日 周${w}`;
}

// 获取当前场次
function getPeriodInfo() {
  const now = new Date();
  const day = now.getDay();
  const h = now.getHours();
  const dateStr = fmtDate(now);
  let allowed = false;
  let periodName = '';
  if (day === 5) {
    if (h >= 6 && h < 20)  { allowed = true; periodName = `${dateStr} 06:00~20:00场`; }
    if (h >= 20 && h < 24) { allowed = true; periodName = `${dateStr} 20:00~24:00场`; }
  } else if (day === 6 || day === 0) {
    if (h >= 8 && h < 12)  { allowed = true; periodName = `${dateStr} 08:00~12:00场`; }
    if (h >= 12 && h < 16) { allowed = true; periodName = `${dateStr} 12:00~16:00场`; }
    if (h >= 16 && h < 20) { allowed = true; periodName = `${dateStr} 16:00~20:00场`; }
    if (h >= 20 && h < 24) { allowed = true; periodName = `${dateStr} 20:00~24:00场`; }
  }
  return { allowed, periodName };
}

// 复活卡校验
function checkAndConsumeCode(code) {
  const cleanCode = code.trim().toLowerCase();
  if (cleanCode === UNLIMITED_CODE.toLowerCase()) return true;
  if (!SINGLE_USE_CODES.has(cleanCode)) return false;
  if (usedCodes.includes(cleanCode)) return false;
  usedCodes.push(cleanCode);
  localStorage.setItem('usedReviveCodes', JSON.stringify(usedCodes));
  return true;
}
function resetAllUsedCodes() {
  if (!confirm('确定重置所有复活密钥？')) return;

  alert('已重置');
}

// 排行榜核心
function saveRank(period, name, score) {
  if (!period) return;
  if (!raceRanks[period]) raceRanks[period] = [];
  const list = raceRanks[period];
  const idx = list.findIndex(x => x.name === name);
  if (idx >= 0) list.splice(idx, 1);
  list.push({ name, score });
  localStorage.setItem('raceRanks', JSON.stringify(raceRanks));
}
function refreshRank() {
  const pi = getPeriodInfo();
  const period = pi.periodName;
  const listEl = $('rankList');
  listEl.innerHTML = '';
  if (!period || !raceRanks[period] || raceRanks[period].length === 0) {
    listEl.innerHTML = '<div style="text-align:center;color:#999;">暂无成绩</div>';
    return;
  }
  const sorted = [...raceRanks[period]].sort((a, b) => b.score - a.score);
  sorted.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'rank-item';
    div.innerHTML = `
      <span class="rank-no">${i+1}</span>
      <span class="rank-name">${item.name}</span>
      <span class="rank-score">${item.score}</span>
    `;
    listEl.appendChild(div);
  });
}

// 清空当前时段榜单

  const pi = getPeriodInfo();

  if (!period) { alert('不在有效时段'); return; }
  if (!confirm('确定清空本时段所有成绩？')) return;
  raceRanks[period] = [];
  localStorage.setItem('raceRanks', JSON.stringify(raceRanks));
  alert('已清空');

}

function showResetRacePanel() {
  $('adminMenu').style.display = 'none';
  $('resetRaceSection').style.display = 'block';
  const pi = getPeriodInfo();
  const currentKey = pi.periodName;
  const container = $('usedAccountsContainer');
  container.innerHTML = '';
  if (!currentKey) {
    container.innerHTML = '<div class="account-item">不在比赛时段</div>';
    return;
  }
  const list = [];
  for (let pwd in usedFixedAccounts) {
    if (usedFixedAccounts[pwd] === currentKey) {
      let name = RACE_FIXED[pwd] || pwd;
      list.push({ pwd, name });
    }
  }
  if (list.length === 0) {
    container.innerHTML = '<div class="account-item">暂无使用账号</div>';
    return;
  }
  list.forEach(item => {
    let div = document.createElement('div');
    div.className = 'account-item';
    div.innerText = `账号：${item.name}`;
    div.onclick = () => {
      delete usedFixedAccounts[item.pwd];
      localStorage.setItem('usedRaceAccounts', JSON.stringify(usedFixedAccounts));

      // 关键：重置账号时同时清空该用户该时段成绩
      const period = getPeriodInfo().periodName;
      if (period && raceRanks[period]) {
        raceRanks[period] = raceRanks[period].filter(x => x.name !== item.name);
        localStorage.setItem('raceRanks', JSON.stringify(raceRanks));
      }
      alert(`已重置：${item.name}（成绩已清空）`);
      showResetRacePanel();
      refreshRank();
    };
    container.appendChild(div);
  });
}

  }

  const isRacePwd = isCompetitionPassword(pwd);
  if (isRacePwd) {
    const pi = getPeriodInfo();
    if (!pi.allowed) { $('loginTip').innerText = '当前非比赛时间'; return; }
    isRaceMode = true;
    racePeriodText = pi.periodName;

    if (pwd in RACE_FIXED) {
      const key = pi.periodName;
      if (isFixedAccountUsed(pwd, key)) { $('loginTip').innerText = '该账号本场已使用'; return; }
      currentUser = RACE_FIXED[pwd];
      markFixedAccountUsed(pwd, key);
    }
  } else {
    if (!(pwd in OLD_PASSWORDS) && !(pwd in UNLIMITED_PASS)) {
      $('loginTip').innerText = '密码不正确'; return;
    }
  }

  life = isRaceMode ? (checkAndConsumeCode(reviveInput) ? 1 : 0) : 1;
  usedLife = 0;
  startGame();
}

// 游戏逻辑
function startGame() {
  $('loginBox').style.display = 'none';
  $('gameBox').style.display = 'block';
  document.body.classList.toggle('competition-mode', isRaceMode);
  $('raceTag').style.display = isRaceMode ? 'inline-block' : 'none';
  $('userInfo').innerText = `玩家：${currentUser}`;
  currentQ = 0; correct = 0;
  questionList = shuffle([...BANK]).slice(0, 12);
  showQuestion();
}
function goBack() {
  clearInterval(timer);
  $('gameBox').style.display = 'none';
  $('endBox').style.display = 'none';
  $('loginBox').style.display = 'block';
  document.body.classList.remove('competition-mode');
  updateTimeDisplay();
}
function showQuestion() {
  if (currentQ >= questionList.length) { showEnd('挑战完成'); return; }
  selected = -1; remain = ANSWER_TIME;
  const q = questionList[currentQ];
  $('question').innerText = `${currentQ+1}. ${q.q}`;
  const opts = document.querySelectorAll('.option');
  opts.forEach((el,i)=>{
    el.innerText = q.o[i];
    el.classList.remove('selected','right','wrong','mask');
  });
  updateCount();
  clearInterval(timer);
  timer = setInterval(()=>{
    remain--; updateCount();
    if (remain <= 0) { clearInterval(timer); judge(); }
  }, 1000);
}
function updateCount() {
  $('countDown').innerText = remain;
  $('progress').style.width = (remain/ANSWER_TIME*100)+'%';
  $('lifeInfo').innerText = `复活卡：${life}`;
}
function pick(idx) {
  if (selected !== -1) return;
  selected = idx;
  const opts = document.querySelectorAll('.option');
  opts.forEach(el=>el.classList.remove('selected'));
  opts[idx].classList.add('selected');
}
function judge() {
  const q = questionList[currentQ];
  const opts = document.querySelectorAll('.option');
  opts.forEach(el=>el.classList.add('mask'));
  let isCorrect = (selected === q.a);

  if (isCorrect) {
    opts[selected].classList.add('right');
    correct++;
  } else {
    if (selected !== -1) opts[selected].classList.add('wrong');
    opts[q.a].classList.add('right');
  }

  setTimeout(()=>{
    if (isCorrect) {
      currentQ++; showQuestion();
    } else {
      if (life > 0) {
        life--; usedLife++; currentQ++; showQuestion();
      } else {
        showEnd('挑战失败');
      }
    }
  }, JUDGE_DELAY);
}
function showEnd(title) {
  clearInterval(timer);
  $('gameBox').style.display = 'none';
  $('endBox').style.display = 'block';
  $('endTitle').innerText = title;
  $('sName').innerText = currentUser;
  $('sCorrect').innerText = correct;
  $('racePeriodTip').innerText = isRaceMode ? `参赛时段：${racePeriodText}` : '';
  $('raceAuth').style.display = isRaceMode ? 'inline-block' : 'none';

  const total = correct + usedLife;
  if (isRaceMode) saveRank(racePeriodText, currentUser, total);

  let finalText = total >=12 ? "请截图给景晨" : total>=10 ? "优秀！" : total>=6 ? "不错！" : "加油！";
  $('sFinal').innerText = finalText;
  refreshRank();
}
function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

updateTimeDisplay();
</script>
