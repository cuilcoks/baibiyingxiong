<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星星的密室日常活动——百币英雄</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:PingFang SC,Microsoft YaHei,sans-serif}
body{background:#0b0b1e;color:#fff}
.main{max-width:700px;margin:0 auto;padding:20px;min-height:100vh}
.game{display:none;background:#0b0b1e;position:relative}
.competition-mode .game{
  display:block;
  background: linear-gradient(90deg, #ffc107 0%, #ffc107 50%, #9c27b0 50%, #9c27b0 100%);
}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 0;gap:8px}
.user-text{color:#aab8c7;font-size:15px;white-space:nowrap}
.life{color:#ffde55;white-space:nowrap}
.count-down{font-size:22px;font-weight:700;color:#ffde55}
.drain-speed{font-size:16px;color:#ff9a9a}
.race-tag{
  background:#ff4380;color:#fff;padding:4px 10px;border-radius:8px;font-size:14px;font-weight:bold;
}
.progress-bar{width:100%;height:8px;background:#1e253e;border-radius:4px;margin:10px 0;overflow:hidden}
.progress-line{height:100%;background:linear-gradient(90deg,#ff4380,#fa7250);width:100%;transition:.1s linear}
.question-box{background:#12172b;border-radius:20px;padding:28px;margin-top:10px}
.question-title{font-size:20px;line-height:1.6;margin-bottom:24px;color:#f0f4ff}
.option{background:#1b223a;border-radius:14px;padding:18px 16px;margin-bottom:12px;font-size:16px;cursor:pointer}
.option.selected{background:#293557}
.option.right{background:#1a6c38}
.option.wrong{background:#7a2c2c}
.option.mask{pointer-events:none}

.login{background:#12172b;border-radius:20px;padding:40px;margin-top:30px;border:1px solid #273050}
.login h2{text-align:center;font-size:24px;color:#f9e488;margin-bottom:26px}
.theme-box{text-align:center;margin-bottom:20px}
.theme-title{font-size:18px;color:#ffde55;font-weight:bold}
.theme-desc{font-size:14px;color:#c0c8e7;margin-top:4px}
.login input{width:100%;height:50px;background:#1b223a;border:none;border-radius:12px;color:#fff;padding:0 16px;font-size:16px;margin-bottom:14px}
.mode-select{
  display:flex;gap:12px;margin-bottom:16px;align-items:center
}
.mode-select label{
  display:flex;align-items:center;gap:6px;color:#fff;font-size:15px;cursor:pointer
}
.login button{width:100%;height:52px;background:linear-gradient(90deg,#6250ff,#8a7aff);border:none;border-radius:12px;color:#fff;font-size:17px;font-weight:700}
.tip{text-align:center;color:#ff5555;margin-top:12px;font-size:14px}
.time-info{text-align:center;margin-top:20px;font-size:15px;color:#c0c8e7}

.admin{display:none;background:#12172b;border-radius:20px;padding:30px;margin-top:20px}
.admin h3{color:#f9e488;margin-bottom:15px}
.admin textarea{width:100%;height:300px;background:#1b223a;color:#fff;border-radius:8px;padding:10px;font-size:14px;margin-bottom:10px}
.admin button{
  background:#6250ff;color:#fff;border:none;border-radius:10px;padding:10px 16px;
  margin-right:10px;margin-bottom:10px;cursor:pointer;font-weight:bold
}
.admin .danger{background:#c92e2e}
.admin .account-item{padding:10px 14px;background:#1b223a;border-radius:8px;margin-bottom:8px;cursor:pointer}
.admin .account-item:hover{background:#253252}

.end{display:none;text-align:center;background:#12172b;border-radius:20px;padding:40px;margin-top:20px}
.end h2{font-size:26px;color:#f9e488;margin-bottom:20px}
.end p{color:#c0c8e7;font-size:16px;margin:6px 0}
.end .final{color:#ffde55;font-size:18px;margin:20px 0}
.end .race-auth{
  display:inline-block;background:#ffc107;color:#000;padding:6px 14px;border-radius:10px;font-weight:bold;margin-top:10px;
}
.end button{background:linear-gradient(90deg,#ff4380,#fa7250);border:none;border-radius:14px;color:#fff;padding:14px 32px;font-size:16px;margin-top:10px}
</style>
</head>
<body>
<div class="main">
  <div class="login" id="loginBox">
    <h2>星星的密室日常活动——百币英雄</h2>
    <div class="theme-box">
      <div class="theme-title">本周主题：时间拉锯战</div>
      <div class="theme-desc">初始30秒，答对+12秒，答错-12秒，扣速每秒+0.01永不重置</div>
    </div>
    <input type="text" id="username" placeholder="请输入昵称">
    <input type="password" id="pwd" placeholder="请输入活动密码">
    <input type="text" id="reviveCode" placeholder="复活卡激活码（比赛模式必填）">

    <div class="mode-select">
      <label>
        <input type="radio" name="gameMode" value="original" checked>
        原版12题
      </label>
      <label>
        <input type="radio" name="gameMode" value="weekly">
        周主题模式
      </label>
    </div>

    <button onclick="login()">开始挑战</button>
    <div class="tip" id="loginTip"></div>
    <div class="time-info" id="timeInfo"></div>
  </div>

  <div class="game" id="gameBox">
    <div class="top-bar">
      <div class="user-text" id="userInfo"></div>
      <div class="race-tag" id="raceTag" style="display:none;">比赛模式</div>
      <div class="life" id="lifeInfo">复活卡：1</div>
      <div class="count-down" id="countDown">12</div>
      <div class="drain-speed" id="drainSpeed"></div>
    </div>
    <div class="progress-bar"><div class="progress-line" id="progress"></div></div>
    <div class="question-box">
      <div class="question-title" id="question"></div>
      <div class="option" onclick="pick(0)"></div>
      <div class="option" onclick="pick(1)"></div>
      <div class="option" onclick="pick(2)"></div>
      <div class="option" onclick="pick(3)"></div>
    </div>
  </div>

  <div class="admin" id="adminPanel">
    <div id="adminMenu">
      <h3>管理员面板</h3>
      <button onclick="showEditQuestions()">修改题目</button>
      <button onclick="showResetRacePanel()">重置比赛账号</button>
      <button onclick="showResetCodePanel()">重置复活密钥</button>
      <button onclick="exitAdmin()">返回登录</button>
    </div>
    <div id="editQuestionsSection" style="display:none">
      <h3>修改题目（JSON）</h3>
      <textarea id="questionEditor"></textarea>
      <button onclick="saveQuestions()">保存题库</button>
      <button onclick="backToAdminMenu()">返回</button>
    </div>
    <div id="resetRaceSection" style="display:none">
      <h3>本场已使用比赛账号（点击重置）</h3>
      <div id="usedAccountsContainer"></div>
      <button onclick="backToAdminMenu()">返回</button>
    </div>
    <div id="resetCodeSection" style="display:none">
      <h3>复活密钥管理</h3>
      <p style="margin-bottom:14px;color:#ccc;">点击将清空所有一次性密钥</p>
      <button class="danger" onclick="resetAllUsedCodes()">重置所有一次性复活密钥</button>
      <button onclick="backToAdminMenu()">返回</button>
    </div>
  </div>

  <div class="end" id="endBox">
    <h2 id="endTitle"></h2>
    <p>昵称：<span id="sName"></span></p>
    <p>答对题数：<span id="sCorrect"></span></p>
    <p id="racePeriodTip" style="margin-top:10px;color:#ffde55"></p>
    <div class="race-auth" id="raceAuth" style="display:none;"></div>
    <div class="final" id="sFinal"></div>
    <button onclick="goBack()">返回</button>
  </div>
</div>

<script>
const OLD_PASSWORDS = {
  "white01":true,"white02":true,"white03":true,"white04":true,"white05":true,
  "noback01":false,"noback02":false,"noback03":false,"noback04":false,"noback05":false
};
const UNLIMITED_PASS = {};
const RACE_FIXED = {
  "jingchen":"景晨","awmcful":"AW","wangyan":"亡烟","nannan":"楠楠",
  "luotuo":"骆驼","xiaosuda":"小苏打","miaomiaojun":"喵喵君"
};
const RACE_FREE = [
  "bisai1","bisai2","bisai3","bisai4","bisai5","bisai6","bisai7","bisai8","bisai9","bisai10",
  "bisai11","bisai12","bisai13","bisai14","bisai15"
];
const ADMIN_PWD = "jingyuan";
const ANSWER_TIME = 12;
const JUDGE_DELAY = 1500;

const SINGLE_USE_CODES = new Set([
  "123789","456123","789456","147258","369852","159357","258741","111222","333444","555666"
]);
const UNLIMITED_CODE = "jingchen";

let isCompetitionAccount = false;
let BANK = [
{q:"单词‘benefit’表示？",o:["益处","伤害","损失","负担"],a:0},
{q:"单词‘consequence’意为？",o:["结果","原因","条件","方式"],a:0},
{q:"英语中，‘然而’的连接词是？",o:["however","therefore","besides","thus"],a:0},
{q:"牛顿第一定律又称？",o:["惯性定律","加速度定律","作用力定律","万有引力定律"],a:0},
{q:"保质期指？",o:["最佳食用期","不可食用","绝对安全","过期可吃"],a:0},
{q:"骨骼最多矿物质？",o:["铁","钙","锌","镁"],a:1},
{q:"电脑病毒不通过？",o:["U盘","空气传播","网络","邮件"],a:1},
{q:"冬季取暖注意？",o:["紧闭门窗","通风防中毒","用炭火","靠近暖气"],a:1},
{q:"剩菜剩饭属于？",o:["可回收","厨余垃圾","有害","其他"],a:1},
{q:"人体最大消化腺？",o:["胃","肝脏","胰腺","小肠"],a:1},
{q:"蒙德风神是谁？",o:["摩拉克斯","巴巴托斯","巴尔泽布","纳西妲"],a:1},
{q:"璃月岩神是谁？",o:["巴巴托斯","摩拉克斯","巴尔泽布","纳西妲"],a:1},
{q:"稻妻雷神是谁？",o:["纳西妲","巴尔泽布","巴巴托斯","摩拉克斯"],a:1},
{q:"须弥草神是谁？",o:["巴尔泽布","纳西妲","巴巴托斯","摩拉克斯"],a:1},
{q:"主角统称？",o:["空","旅行者","荧","派蒙"],a:1},
{q:"西风骑士团团长？",o:["丽莎","琴","凯亚","安柏"],a:1},
{q:"璃月天权星是？",o:["刻晴","凝光","钟离","甘雨"],a:1},
{q:"神里家大小姐是？",o:["神里绫人","神里绫华","宵宫","早柚"],a:1},
{q:"枫丹水神是？",o:["那维莱特","芙宁娜","莱欧斯利","克洛琳德"],a:1},
{q:"《原神》中‘尘世七执政'不包含？",o:["火神","冰神","月神","水神"],a:2},
{q:"星穹主角统称？",o:["丹恒","开拓者","三月七","姬子"],a:1},
{q:"列车长是？",o:["姬子","帕姆","瓦尔特","杨"],a:1},
{q:"贝洛伯格守护者？",o:["希儿","布洛妮娅","杰帕德","桑博"],a:1},
{q:"仙舟罗浮将军？",o:["彦卿","景元","白露","停云"],a:1},
{q:"星核猎手领袖？",o:["银狼","卡芙卡","艾利欧","萨姆"],a:1},
{q:"下层区领袖是？",o:["布洛妮娅","希儿","杰帕德","桑博"],a:1},
{q:"云上五骁不含？",o:["景元","白露","刃","镜流"],a:1},
{q:"星际和平公司代表？",o:["石心","托帕","黑塔","艾丝妲"],a:1},
{q:"主角核心是？",o:["星尘","星核","星光","星云"],a:1},
{q:"毁灭星神是？",o:["阿基维利","纳努克","姬子","瓦尔特"],a:1}
];

const $ = id => document.getElementById(id);
let currentUser = '', isRaceMode = false, racePeriodText = '';
let usedFixedAccounts = JSON.parse(localStorage.getItem('usedRaceAccounts') || '{}');
let usedCodes = JSON.parse(localStorage.getItem('usedReviveCodes') || '[]');

let selectedMode = "original";

let timeLeft = 30;
let correctCount = 0;
let timeTimer = null;
let remainingQuestions = [];
let currentQuestion = null;

let drainPerSecond = 1.00;
let drainStep = 0.01;

let questionList = [], currentQ = 0, correct = 0, life = 1, usedLife = 0, timer = null, remain = ANSWER_TIME, selected = -1;

function fmtDate(d) {
  const year = d.getFullYear(), month = String(d.getMonth()+1).padStart(2,'0'), date = String(d.getDate()).padStart(2,'0');
  const w = ['日','一','二','三','四','五','六'][d.getDay()];
  return `${year}年${month}月${date}日 周${w}`;
}
function getPeriodInfo() {
  const now = new Date(), day = now.getDay(), h = now.getHours(), dateStr = fmtDate(now);
  let allowed = false, periodName = '';
  if (day === 5) {
    if (h >= 6 && h < 20)  { allowed = true; periodName = `${dateStr} 06:00~20:00场`; }
    if (h >= 20 && h < 24) { allowed = true; periodName = `${dateStr} 20:00~24:00场`; }
  } else if (day === 6 || day === 0) {
    if (h >= 8 && h < 12)  { allowed = true; periodName = `${dateStr} 08:00~12:00场`; }
    if (h >= 12 && h < 16) { allowed = true; periodName = `${dateStr} 12:00~16:00场`; }
    if (h >= 16 && h < 20) { allowed = true; periodName = `${dateStr} 16:00~20:00场`; }
    if (h >= 20 && h < 24) { allowed = true; periodName = `${dateStr} 20:00~24:00场`; }
  }
  return { allowed, periodName };
}
function updateTimeDisplay() {
  const pi = getPeriodInfo();
  pi.allowed ? $('timeInfo').innerText = pi.periodName : $('timeInfo').innerText = '目前不是挑战模式时间';
}
function isFixedAccountUsed(pwd, key) { return usedFixedAccounts[pwd] === key; }
function markFixedAccountUsed(pwd, key) { usedFixedAccounts[pwd] = key; localStorage.setItem('usedRaceAccounts', JSON.stringify(usedFixedAccounts)); }
function isCompetitionPassword(pwd) { return pwd in RACE_FIXED || RACE_FREE.includes(pwd); }
function checkAndConsumeCode(code) {
  const c = code.trim().toLowerCase();
  if (c === UNLIMITED_CODE.toLowerCase()) return true;
  if (!SINGLE_USE_CODES.has(c)) return false;
  if (usedCodes.includes(c)) return false;
  usedCodes.push(c); localStorage.setItem('usedReviveCodes', JSON.stringify(usedCodes));
  return true;
}
function resetAllUsedCodes() { if (!confirm('确定重置？')) return; usedCodes = []; localStorage.setItem('usedReviveCodes', JSON.stringify(usedCodes)); alert('已重置'); }

function showAdminMenu() { $('adminMenu').style.display='block'; $('editQuestionsSection').style.display='none'; $('resetRaceSection').style.display='none'; $('resetCodeSection').style.display='none'; }
function showEditQuestions(){ $('adminMenu').style.display='none'; $('editQuestionsSection').style.display='block'; }
async function showResetRacePanel(){
  $('adminMenu').style.display='none'; $('resetRaceSection').style.display='block';
  const pi=getPeriodInfo(), ck=pi.periodName, c=$('usedAccountsContainer'); c.innerHTML='';
  if(!ck){ c.innerHTML='<div class="account-item">不在比赛时段</div>'; return; }
  const list=[]; for(let p in usedFixedAccounts){ if(usedFixedAccounts[p]===ck) list.push({pwd:p,name:RACE_FIXED[p]||p}); }
  if(list.length===0){ c.innerHTML='<div class="account-item">暂无使用账号</div>'; return; }
  list.forEach(item=>{
    const d=document.createElement('div'); d.className='account-item'; d.innerText=`账号：${item.name}`;
    d.onclick=()=>{ delete usedFixedAccounts[item.pwd]; localStorage.setItem('usedRaceAccounts',JSON.stringify(usedFixedAccounts)); alert(`已重置：${item.name}`); showResetRacePanel(); };
    c.appendChild(d);
  });
}
function showResetCodePanel(){ $('adminMenu').style.display='none'; $('resetCodeSection').style.display='block'; }
function backToAdminMenu(){ showAdminMenu(); }
function exitAdmin(){ $('adminPanel').style.display='none'; $('loginBox').style.display='block'; }
function saveQuestions(){ try{ BANK=JSON.parse($('questionEditor').value); alert('保存成功'); }catch(e){ alert('JSON格式错误'); } }

function login(){
  const u = $('username').value.trim();
  const p = $('pwd').value.trim();
  const r = $('reviveCode').value.trim();
  const modes = document.getElementsByName('gameMode');
  selectedMode = "original";
  for(let m of modes){ if(m.checked) selectedMode = m.value; }

  $('loginTip').innerText='';
  if(!p){ $('loginTip').innerText='请输入密码'; return; }
  currentUser = u;
  isRaceMode = false;
  racePeriodText = '';
  isCompetitionAccount = isCompetitionPassword(p);

  if(p === ADMIN_PWD){
    $('loginBox').style.display='none';
    $('adminPanel').style.display='block';
    showAdminMenu();
    updateTimeDisplay();
    return;
  }

  if(isCompetitionAccount){
    const pi = getPeriodInfo();
    if(!pi.allowed){ $('loginTip').innerText='当前非比赛时间'; return; }
    isRaceMode = true;
    racePeriodText = pi.periodName;
    if(p in RACE_FIXED){
      const k = pi.periodName;
      if(isFixedAccountUsed(p,k)){ $('loginTip').innerText='该账号本场已使用'; return; }
      currentUser = RACE_FIXED[p];
      markFixedAccountUsed(p,k);
    }
  }else{
    if(!(p in OLD_PASSWORDS)){ $('loginTip').innerText='密码不正确'; return; }
  }

  life = isRaceMode ? (checkAndConsumeCode(r) ? 1 : 0) : 1;
  usedLife = 0;

  if(selectedMode === 'weekly'){
    startTimeWar();
  }else{
    startOriginalMode();
  }
}

function startTimeWar(){
  timeLeft = 30;
  correctCount = 0;
  drainPerSecond = 1.00;
  remainingQuestions = shuffle([...BANK]);
  $('loginBox').style.display='none';
  $('gameBox').style.display='block';
  document.body.classList.toggle('competition-mode', isRaceMode);
  $('raceTag').style.display = isRaceMode ? 'inline-block' : 'none';
  $('userInfo').innerText = `玩家：${currentUser}`;
  loadNextQuestion();
  startTimeTimer();
}

function startTimeTimer(){
  clearInterval(timeTimer);
  timeTimer = setInterval(()=>{
    timeLeft -= drainPerSecond;
    timeLeft = Math.round(timeLeft * 100) / 100;

    drainPerSecond += drainStep;
    drainPerSecond = Math.round(drainPerSecond * 100) / 100;

    if(timeLeft <= 0){
      timeLeft = 0;
      clearInterval(timeTimer);
      showTimeEnd('时间耗尽');
    }
    updateTimeUI();
  }, 1000);
}

function updateTimeUI(){
  $('countDown').innerText = timeLeft.toFixed(2);
  $('drainSpeed').innerText = '扣速：' + drainPerSecond.toFixed(2) + 's/秒';
  $('progress').style.width = Math.min(100, Math.max(0, (timeLeft / 30) * 100)) + '%';
  $('lifeInfo').innerText = `答对：${correctCount}`;
}

function loadNextQuestion(){
  if(remainingQuestions.length === 0){
    clearInterval(timeTimer);
    showTimeEnd('题库已空，你暂时胜利');
    return;
  }
  const idx = Math.floor(Math.random() * remainingQuestions.length);
  currentQuestion = remainingQuestions[idx];
  remainingQuestions.splice(idx, 1);
  $('question').innerText = currentQuestion.q;
  const opts = document.querySelectorAll('.option');
  opts.forEach((e,i)=>{
    e.innerText = currentQuestion.o[i];
    e.classList.remove('selected','right','wrong','mask');
  });
  selected = -1;
}

function pick(idx){
  if(selectedMode !== 'weekly'){
    if(selected !== -1) return;
    selected = idx;
    const o = document.querySelectorAll('.option');
    o.forEach(e=>e.classList.remove('selected'));
    o[idx].classList.add('selected');
    return;
  }

  if(selected !== -1) return;
  selected = idx;
  const opts = document.querySelectorAll('.option');
  opts.forEach(e=>e.classList.add('mask'));
  const ok = idx === currentQuestion.a;
  if(ok){
    opts[idx].classList.add('right');
    correctCount++;
    timeLeft += 12;
  }else{
    opts[idx].classList.add('wrong');
    opts[currentQuestion.a].classList.add('right');
    timeLeft -= 12;
  }
  setTimeout(()=>{
    loadNextQuestion();
  }, 800);
}

function showTimeEnd(title){
  clearInterval(timeTimer);
  $('gameBox').style.display='none';
  $('endBox').style.display='block';
  $('endTitle').innerText = title;
  $('sName').innerText = currentUser;
  $('sCorrect').innerText = correctCount;
  $('racePeriodTip').innerText = isRaceMode ? `参赛时段：${racePeriodText}` : '';
  $('raceAuth').style.display = isRaceMode ? 'inline-block' : 'none';
  $('sFinal').innerText = title === '题库已空，你暂时胜利' ? '通关全部题目！' : `共答对 ${correctCount} 题`;
}

function startOriginalMode(){
  $('loginBox').style.display='none';
  $('gameBox').style.display='block';
  document.body.classList.toggle('competition-mode', isRaceMode);
  $('raceTag').style.display = isRaceMode ? 'inline-block' : 'none';
  $('userInfo').innerText = `玩家：${currentUser}`;
  currentQ = 0;
  correct = 0;
  questionList = shuffle([...BANK]).slice(0, 12);
  showQuestion();
  $('drainSpeed').innerText = '';
}

function goBack(){
  clearInterval(timer);
  clearInterval(timeTimer);
  $('gameBox').style.display='none';
  $('endBox').style.display='none';
  $('loginBox').style.display='block';
  document.body.classList.remove('competition-mode');
  updateTimeDisplay();
}

function showQuestion(){
  if(currentQ >= questionList.length){ showEnd('挑战完成'); return; }
  selected = -1;
  remain = ANSWER_TIME;
  const q = questionList[currentQ];
  $('question').innerText = `${currentQ+1}. ${q.q}`;
  const o = document.querySelectorAll('.option');
  o.forEach((e,i)=>{
    e.innerText = q.o[i];
    e.classList.remove('selected','right','wrong','mask');
  });
  updateCount();
  clearInterval(timer);
  timer = setInterval(()=>{
    remain--;
    updateCount();
    if(remain <= 0){
      clearInterval(timer);
      judge();
    }
  }, 1000);
}

function updateCount(){
  $('countDown').innerText = remain;
  $('progress').style.width = (remain/ANSWER_TIME*100) + '%';
  $('lifeInfo').innerText = `复活卡：${life}`;
}

function judge(){
  const q = questionList[currentQ];
  const o = document.querySelectorAll('.option');
  o.forEach(e=>e.classList.add('mask'));
  const ok = selected === q.a;
  if(ok){
    o[selected].classList.add('right');
    correct++;
  }else{
    if(selected !== -1) o[selected].classList.add('wrong');
    o[q.a].classList.add('right');
  }
  setTimeout(()=>{
    if(ok){
      currentQ++;
      showQuestion();
    }else{
      if(life > 0){
        life--;
        usedLife++;
        currentQ++;
        showQuestion();
      }else{
        showEnd('挑战失败');
      }
    }
  }, JUDGE_DELAY);
}

function showEnd(t){
  clearInterval(timer);
  $('gameBox').style.display='none';
  $('endBox').style.display='block';
  $('endTitle').innerText = t;
  $('sName').innerText = currentUser;
  $('sCorrect').innerText = correct;
  $('racePeriodTip').innerText = isRaceMode ? `参赛时段：${racePeriodText}` : '';
  $('raceAuth').style.display = isRaceMode ? 'inline-block' : 'none';
  const total = correct + usedLife;
  const ft = total >= 12 ? "请截图给景晨" : total >= 10 ? "优秀！" : total >= 6 ? "不错！" : "加油！";
  $('sFinal').innerText = ft;
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

updateTimeDisplay();
</script>
