<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:PingFang SC,Microsoft YaHei,sans-serif}
body{background:#0b0f1e;color:#fff}
.main{max-width:700px;margin:0 auto;padding:20px;min-height:100vh}

.game{display:none;background:#0b0f1e;position:relative}
.competition-mode .game{
  display:block;
  background: linear-gradient(90deg, #ffc107 0%, #ffc107 50%, #9c27b0 50%, #9c27b0 100%);
}

.top-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 0}
.user-text{color:#a0a8c8;font-size:15px}
.life{color:#ffde55}
.count-down{font-size:22px;font-weight:700;color:#ffde55}
.progress-bar{width:100%;height:8px;background:#1e253e;border-radius:4px;margin:10px 0;overflow:hidden}
.progress-line{height:100%;background:linear-gradient(90deg,#ff4380,#fa7250);width:100%;transition:.1s linear}

.question-box{background:#12172b;border-radius:20px;padding:28px;margin-top:10px}
.question-title{font-size:20px;line-height:1.6;margin-bottom:24px;color:#f0f4ff}
.option{background:#1b223a;border-radius:14px;padding:18px 16px;margin-bottom:12px;font-size:16px;cursor:pointer}
.option.selected{background:#293557}
.option.right{background:#1a6c38}
.option.wrong{background:#7a2c2c}
.option.mask{pointer-events:none}

.login{background:#12172b;border-radius:20px;padding:40px;margin-top:30px;border:1px solid #273050}
.login h2{text-align:center;font-size:24px;color:#f9e488;margin-bottom:26px}
.login input{width:100%;height:50px;background:#1b223a;border:none;border-radius:12px;color:#fff;padding:0 16px;font-size:16px;margin-bottom:14px}
.login button{width:100%;height:52px;background:linear-gradient(90deg,#6250ff,#8a7aff);border:none;border-radius:12px;color:#fff;font-size:17px;font-weight:700}
.tip{text-align:center;color:#ff5555;margin-top:12px;font-size:14px}
.time-info{text-align:center;margin-top:20px;font-size:15px;color:#c0c8e7}

.admin{display:none;background:#12172b;border-radius:20px;padding:30px;margin-top:20px}
.admin h3{color:#f9e488;margin-bottom:15px}
.admin textarea{width:100%;height:300px;background:#1b223a;color:#fff;border-radius:8px;padding:10px;font-size:14px;margin-bottom:10px}
.admin button{background:#6250ff;color:#fff;border:none;border-radius:10px;padding:10px 16px;margin-right:10px}

.end{display:none;text-align:center;background:#12172b;border-radius:20px;padding:40px;margin-top:20px}
.end h2{font-size:26px;color:#f9e488;margin-bottom:20px}
.end p{color:#c0c8e7;font-size:16px;margin:6px 0}
.end .final{color:#ffde55;font-size:18px;margin:20px 0}
.end button{background:linear-gradient(90deg,#ff4380,#fa7250);border:none;border-radius:14px;color:#fff;padding:14px 32px;font-size:16px;margin-top:10px}
</style>
</head>
<body>
<div class="main">
  <div class="login" id="loginBox">
    <h2>星星的密室日常活动——百币英雄</h2>
    <input type="text" id="username" placeholder="请输入昵称">
    <input type="password" id="pwd" placeholder="请输入活动密码">
    <button onclick="login()">开始挑战</button>
    <div class="tip" id="loginTip"></div>
    <div class="time-info" id="timeInfo"></div>
  </div>

  <div class="game" id="gameBox">
    <div class="top-bar">
      <div class="user-text" id="userInfo"></div>
      <div class="life" id="lifeInfo">复活卡：1</div>
      <div class="count-down" id="countDown">12</div>
    </div>
    <div class="progress-bar"><div class="progress-line" id="progress"></div></div>
    <div class="question-box">
      <div class="question-title" id="question"></div>
      <div class="option" onclick="pick(0)"></div>
      <div class="option" onclick="pick(1)"></div>
      <div class="option" onclick="pick(2)"></div>
      <div class="option" onclick="pick(3)"></div>
    </div>
  </div>

  <div class="admin" id="adminPanel">
    <h3>管理员 - 题库编辑</h3>
    <textarea id="questionEditor"></textarea>
    <button onclick="saveQuestions()">保存题库</button>
    <button onclick="copyFullCode()">复制完整代码</button>
  </div>

  <div class="end" id="endBox">
    <h2 id="endTitle"></h2>
    <p>昵称：<span id="sName"></span></p>
    <p>答对题数：<span id="sCorrect"></span></p>
    <p id="racePeriodTip" style="margin-top:10px;color:#ffde55"></p>
    <div class="final" id="sFinal"></div>
    <button onclick="goBack()">返回</button>
  </div>
</div>

const $ = id => document.getElementById(id);
let currentUser = '';
let isRaceMode = false;
let racePeriodText = '';
let usedFixedAccounts = JSON.parse(localStorage.getItem('usedRaceAccounts') || '{}');

let questionList = [];
let currentQ = 0;
let correct = 0;
let life = 1;
let timer = null;
let remain = ANSWER_TIME;
let selected = -1;

function fmtDate(d) {
  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const date = String(d.getDate()).padStart(2, '0');
  const w = ['日', '一', '二', '三', '四', '五', '六'][d.getDay()];
  return `${year}年${month}月${date}日 周${w}`;
}

function getPeriodInfo() {
  const now = new Date();
  const day = now.getDay();
  const h = now.getHours();
  const dateStr = fmtDate(now);
  let allowed = false;
  let periodName = '';

  if (day === 5) {
    if (h >= 6 && h < 20) {
      allowed = true;
      periodName = `${dateStr} 06:00~20:00场`;
    } else if (h >= 20 && h < 24) {
      allowed = true;
      periodName = `${dateStr} 20:00~24:00场`;
    }
  } else if (day === 6 || day === 0) {
    if (h >= 8 && h < 12) {
      allowed = true; periodName = `${dateStr} 08:00~12:00场`;
    } else if (h >= 12 && h < 16) {
      allowed = true; periodName = `${dateStr} 12:00~16:00场`;
    } else if (h >= 16 && h < 20) {
      allowed = true; periodName = `${dateStr} 16:00~20:00场`;
    } else if (h >= 20 && h < 24) {
      allowed = true; periodName = `${dateStr} 20:00~24:00场`;
    }
  }

  return { allowed, periodName };
}

function updateTimeDisplay() {
  const pi = getPeriodInfo();
  if (pi.allowed) {
    $('timeInfo').innerText = pi.periodName;
  } else {
    $('timeInfo').innerText = '目前不是挑战模式时间';
  }
}

function isFixedAccountUsed(pwd, periodKey) {
  return usedFixedAccounts[pwd] === periodKey;
}

function markFixedAccountUsed(pwd, periodKey) {
  usedFixedAccounts[pwd] = periodKey;
  localStorage.setItem('usedRaceAccounts', JSON.stringify(usedFixedAccounts));
}

function isCompetitionPassword(pwd) {
  return pwd in RACE_FIXED || RACE_FREE.includes(pwd);
}

function login() {
  const userInput = $('username').value.trim();
  const pwd = $('pwd').value.trim();
  $('loginTip').innerText = '';

  if (!pwd) { $('loginTip').innerText = '请输入活动密码'; return; }

  currentUser = userInput;
  isRaceMode = false;
  racePeriodText = '';
  isCompetitionAccount = isCompetitionPassword(pwd);

  if (pwd === ADMIN_PWD) {
    $('loginBox').style.display = 'none';
    $('adminPanel').style.display = 'block';
    $('questionEditor').value = JSON.stringify(BANK, null, 2);
    return;
  }

  const isRacePwd = isCompetitionPassword(pwd);
  if (isRacePwd) {
    const pi = getPeriodInfo();
    if (!pi.allowed) {
      $('loginTip').innerText = '当前非比赛时间，无法进入';
      return;
    }
    isRaceMode = true;
    racePeriodText = pi.periodName;

    if (pwd in RACE_FIXED) {
      const key = pi.periodName;
      if (isFixedAccountUsed(pwd, key)) {
        $('loginTip').innerText = '该账号在本场次已使用过，无法重复进入';
        return;
      }
      currentUser = RACE_FIXED[pwd];
      markFixedAccountUsed(pwd, key);
    }
  } else {
    if (!(pwd in OLD_PASSWORDS) && !(pwd in UNLIMITED_PASS)) {
      $('loginTip').innerText = '密码不正确';
      return;
    }
  }

  startGame();
}

function startGame() {
  $('loginBox').style.display = 'none';
  $('adminPanel').style.display = 'none';
  $('endBox').style.display = 'none';
  $('gameBox').style.display = 'block';

  if (isCompetitionAccount) {
    document.body.classList.add('competition-mode');
  } else {
    document.body.classList.remove('competition-mode');
  }

  $('userInfo').innerText = `玩家：${currentUser}`;
  life = 1; correct = 0; currentQ = 0;
  questionList = shuffle([...BANK]).slice(0, 12);
  showQuestion();
}

function goBack() {
  clearInterval(timer);
  $('gameBox').style.display = 'none';
  $('endBox').style.display = 'none';
  $('adminPanel').style.display = 'none';
  $('loginBox').style.display = 'block';
  document.body.classList.remove('competition-mode');
  updateTimeDisplay();
}

function showQuestion() {
  if (currentQ >= questionList.length) {
    showEnd('挑战完成');
    return;
  }
  selected = -1;
  remain = ANSWER_TIME;
  const q = questionList[currentQ];
  $('question').innerText = `${currentQ + 1}. ${q.q}`;

  const opts = document.querySelectorAll('.option');
  opts.forEach((el, i) => {
    el.innerText = q.o[i];
    el.classList.remove('selected', 'right', 'wrong', 'mask');
  });

  updateCount();
  clearInterval(timer);
  timer = setInterval(() => {
    remain--;
    updateCount();
    if (remain <= 0) {
      clearInterval(timer);
      judge();
    }
  }, 1000);
}

function updateCount() {
  $('countDown').innerText = remain;
  $('progress').style.width = (remain / ANSWER_TIME * 100) + '%';
  $('lifeInfo').innerText = `复活卡：${life}`;
}

function pick(idx) {
  if (selected !== -1) return;
  selected = idx;
  const opts = document.querySelectorAll('.option');
  opts.forEach(el => el.classList.remove('selected'));
  opts[idx].classList.add('selected');
}

function judge() {
  const q = questionList[currentQ];
  const opts = document.querySelectorAll('.option');
  opts.forEach(el => el.classList.add('mask'));

  let isCorrect = false;
  if (selected === q.a) {
    opts[selected].classList.add('right');
    correct++;
    isCorrect = true;
  } else {
    if (selected !== -1) opts[selected].classList.add('wrong');
    opts[q.a].classList.add('right');
  }

  setTimeout(() => {
    if (isCorrect) {
      currentQ++;
      showQuestion();
    } else {
      life--;
      if (life < 0) {
        showEnd('淘汰');
      } else {
        currentQ++;
        showQuestion();
      }
    }
  }, JUDGE_DELAY);
}

function showEnd(reason) {
  clearInterval(timer);
  $('gameBox').style.display = 'none';
  $('endBox').style.display = 'block';
  $('endTitle').innerText = reason;
  $('sName').innerText = currentUser;
  $('sCorrect').innerText = correct;
  $('racePeriodTip').innerText = isRaceMode ? `场次：${racePeriodText}` : '';
  $('sFinal').innerText = reason === '淘汰' ? '很遗憾，挑战结束' : '🎉 挑战完成';
}

function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function saveQuestions() {
  try {
    const data = JSON.parse($('questionEditor').value);
    BANK = data;
    alert('保存题库成功');
  } catch (e) {
    alert('JSON 格式错误，保存失败');
  }
}

function copyFullCode() {
  const html = document.documentElement.outerHTML;
  navigator.clipboard.writeText(html).then(() => alert('已复制完整代码'));
}

updateTimeDisplay();
</script>
