<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>百币英雄 - 答题挑战</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family: "Microsoft YaHei", sans-serif}
  body{background:#0b0f1e;color:#fff}
  .main{max-width:700px;margin:0 auto;padding:20px;min-height:100vh}

  .game{display:none;background:#0b0f1e}
  .competition-mode .game{
    display:block;
    background: linear-gradient(90deg, #ffc107 0%, #ffc107 50%, #9c27b0 50%, #9c27b0 100%);
  }

  .top-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 0}
  .user-text{color:#a0a8c8;font-size:15px}
  .life{color:#ffde55}
  .count-down{font-size:22px;font-weight:700;color:#ffde55}
  .progress-bar{width:100%;height:8px;background:#1e253e;border-radius:4px;margin:10px 0}
  .progress-line{height:100%;background:linear-gradient(90deg,#ff4380,#fa7250);width:0}

  .question-box{background:#12172b;border-radius:20px;padding:28px;margin-top:10px}
  .question-title{font-size:20px;margin-bottom:24px;color:#f0f4ff}
  .option{background:#1b223a;border-radius:14px;padding:18px 16px;margin-bottom:12px;font-size:16px;cursor:pointer}
  .option.selected{background:#293557}
  .option.right{background:#1a6c38}
  .option.wrong{background:#7a2c2c}
  .option.mask{pointer-events:none}

  .login{background:#12172b;border-radius:20px;padding:40px;margin-top:30px;border:1px solid #273050}
  .login h2{text-align:center;font-size:24px;color:#f9e488;margin-bottom:26px}
  .login input{width:100%;height:50px;background:#1b223a;border:none;border-radius:12px;color:#fff;padding:0 16px;font-size:16px;margin-bottom:14px}
  .login button{width:100%;height:52px;background:linear-gradient(90deg,#6250ff,#8a7aff);border:none;border-radius:12px;color:#fff;font-size:17px;font-weight:700}
  .tip{text-align:center;color:#ff5555;margin-top:12px;font-size:14px}
  .time-info{text-align:center;margin-top:20px;font-size:15px;color:#c0c8e7}

  .end{display:none;text-align:center;background:#12172b;border-radius:20px;padding:40px;margin-top:20px}
  .end h2{font-size:26px;color:#f9e488;margin-bottom:20px}
  .end p{color:#c0c8e7;font-size:16px;margin:6px 0}
  .end .final{color:#ffde55;font-size:18px;margin:20px 0}
  .end button{background:linear-gradient(90deg,#ff4380,#fa7250);border:none;border-radius:14px;color:#fff;padding:14px 32px;font-size:16px;margin-top:10px}
</style>
</head>
<body>
<div class="main">
  <div class="login" id="loginBox">
    <h2>百币英雄答题挑战</h2>
    <input type="text" id="username" placeholder="请输入昵称">
    <input type="password" id="pwd" placeholder="请输入活动密码">
    <button onclick="login()">开始挑战</button>
    <div class="tip" id="loginTip"></div>
    <div class="time-info" id="timeInfo"></div>
  </div>

  <div class="game" id="gameBox">
    <div class="top-bar">
      <div class="user-text" id="userInfo"></div>
      <div class="life" id="lifeInfo">生命：3</div>
      <div class="count-down" id="countDown">12</div>
    </div>
    <div class="progress-bar"><div class="progress-line" id="progress"></div></div>
    <div class="question-box">
      <div class="question-title" id="question"></div>
      <div class="option" onclick="pick(0)"></div>
      <div class="option" onclick="pick(1)"></div>
      <div class="option" onclick="pick(2)"></div>
      <div class="option" onclick="pick(3)"></div>
    </div>
  </div>

  <div class="end" id="endBox">
    <h2 id="endTitle"></h2>
    <p>昵称：<span id="sName"></span></p>
    <p>答对题数：<span id="sCorrect"></span></p>
    <p id="racePeriodTip" style="margin-top:10px;color:#ffde55"></p>
    <div class="final" id="sFinal"></div>
    <button onclick="goBack()">返回主页</button>
  </div>
</div>

const $ = id => document.getElementById(id);
let currentUser = '';
let isRaceMode = false;
let racePeriodText = '';
let usedFixedAccounts = JSON.parse(localStorage.getItem('usedRaceAccounts') || '{}');

let life = 3;
let score = 0;
let current = null;
let timer = null;
let timeLeft = 0;

function fmtDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const d2 = String(d.getDate()).padStart(2,'0');
  const w = '日一二三四五六'[d.getDay()];
  return `${y}年${m}月${d2}日 周${w}`;
}

function getPeriodInfo() {
  const now = new Date();
  const day = now.getDay();
  const h = now.getHours();
  const ds = fmtDate(now);
  let allow = false;
  let text = '';
  if (day === 5) {
    if (h>=6 && h<20){ allow=true; text=`${ds} 06:00~20:00场`; }
    else if (h>=20 && h<24){ allow=true; text=`${ds} 20:00~24:00场`; }
  } else if (day===6||day===0) {
    if (h>=8&&h<12){ allow=true; text=`${ds} 08:00~12:00场`; }
    else if (h>=12&&h<16){ allow=true; text=`${ds} 12:00~16:00场`; }
    else if (h>=16&&h<20){ allow=true; text=`${ds} 16:00~20:00场`; }
    else if (h>=20&&h<24){ allow=true; text=`${ds} 20:00~24:00场`; }
  }
  return {allow, text};
}

function updateTimeDisplay() {
  const p = getPeriodInfo();
  $('timeInfo').innerText = p.allow ? p.text : '目前不是挑战模式时间';
}

function isUsed(pwd, key) {
  return usedFixedAccounts[pwd] === key;
}
function markUsed(pwd, key) {
  usedFixedAccounts[pwd] = key;
  localStorage.setItem('usedRaceAccounts', JSON.stringify(usedFixedAccounts));
}

function login() {
  const u = $('username').value.trim();
  const p = $('pwd').value.trim();
  if (!u || !p) { $('loginTip').innerText='请填写昵称和密码'; return; }

  const pi = getPeriodInfo();
  const isRace = ['jingchen','awmcful','wangyan','nannan','luotuo','baoyu','miaomiaojun','bisai1','bisai2','bisai3','bisai4','bisai5','bisai6','bisai7','bisai8','bisai9','bisai10','bisai11','bisai12','bisai13','bisai14','bisai15'].includes(p);

  if (isRace) {
    if (!pi.allow) { $('loginTip').innerText='当前非挑战时间'; return; }
    if (isUsed(p, pi.text)) { $('loginTip').innerText='该账号本场已使用'; return; }
    markUsed(p, pi.text);
    isRaceMode = true;
    racePeriodText = pi.text;
  } else {
    isRaceMode = false;
    racePeriodText = '';
  }

  currentUser = u;
  life = 3;
  score = 0;
  nextQuestion();
  $('loginBox').style.display = 'none';
  $('gameBox').style.display = 'block';
  if (isRaceMode) document.body.classList.add('competition-mode');
  else document.body.classList.remove('competition-mode');
}

function nextQuestion() {
  clearInterval(timer);
  current = BANK[Math.floor(Math.random()*BANK.length)];
  $('question').innerText = current.q;
  const ops = document.querySelectorAll('.option');
  ops.forEach((o,i)=>{
    o.innerText = current.o[i];
    o.className = 'option';
  });
  timeLeft = 12;
  $('countDown').innerText = timeLeft;
  $('progress').style.width = '0%';
  $('lifeInfo').innerText = `生命：${life}`;
  timer = setInterval(()=>{
    timeLeft--;
    $('countDown').innerText = timeLeft;
    $('progress').style.width = ((12-timeLeft)/12*100)+'%';
    if (timeLeft <= 0) {
      life--;
      if (life <= 0) endGame('挑战失败');
      else nextQuestion();
    }
  }, 1000);
}

function pick(i) {
  clearInterval(timer);
  const ops = document.querySelectorAll('.option');
  ops.forEach(o=>o.classList.add('mask'));
  ops[current.a].classList.add('right');
  if (i === current.a) {
    score++;
    setTimeout(nextQuestion, 800);
  } else {
    ops[i].classList.add('wrong');
    life--;
    if (life <= 0) setTimeout(()=>endGame('挑战失败'),800);
    else setTimeout(nextQuestion, 800);
  }
}

function endGame(title) {
  clearInterval(timer);
  $('gameBox').style.display = 'none';
  $('endBox').style.display = 'block';
  $('endTitle').innerText = title;
  $('sName').innerText = currentUser;
  $('sCorrect').innerText = score;
  $('racePeriodTip').innerText = racePeriodText ? `场次：${racePeriodText}` : '';
  if (title === '挑战失败') {
    $('sFinal').innerText = `最终得分：${score}`;
  } else {
    $('sFinal').innerText = `恭喜完成！得分：${score}`;
  }
}

function goBack() {
  $('endBox').style.display = 'none';
  $('loginBox').style.display = 'block';
  updateTimeDisplay();
}

updateTimeDisplay();
</script>
</body>
</html>
