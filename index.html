{q:"水上项目是？",o:["跑步","游泳","跳高","铅球"],a:1},
{q:"俯卧撑练？",o:["腿","胸臂","腹","背"],a:1},
{q:"慢跑锻炼？",o:["心肺","力量","爆发","柔韧"],a:0},

{q:"YYDS 意思是？",o:["永远的神","一样的事","一样帅","一样傻"],a:0},
{q:"破防了意思是？",o:["防御坏了","心理破防","游戏输了","网断了"],a:1},
{q:"内卷意思是？",o:["内部竞争","外部合作","躺平","摆烂"],a:0},
{q:"躺平意思是？",o:["努力","不折腾","竞争","创业"],a:1},
{q:"栓Q 意思是？",o:["感谢","道歉","吐槽","生气"],a:0},
{q:"退退退出自？",o:["吵架梗","游戏梗","综艺梗","影视梗"],a:0},
{q:"挖呀挖是？",o:["儿歌梗","游戏梗","综艺梗","影视梗"],a:0},
{q:"电子榨菜指？",o:["下饭视频","电子垃圾","游戏","外卖"],a:0},
{q:"显眼包意思？",o:["低调","出风头","有钱","路人"],a:1},
{q:"泰酷辣是谁梗？",o:["王鹤棣","鹿晗","吴亦凡","黄子韬"],a:0}
];

const $ = id => document.getElementById(id);
let userName = "", isRace = false, currentPeriod = "", life = 1;
let usedIndexSet = new Set(), normalQ = null, timeQ = null, normalCorrect = 0, timeCorrect = 0;
let normalIndex = 0, timeIndex = 0, gameOver = false;
let totalTime = 120, decay = 1.0, timeLoop = null;
let wrongCount = 0;

let usedAccounts = JSON.parse(localStorage.getItem('usedRaceAccounts') || '{}');
let usedReviveCodes = JSON.parse(localStorage.getItem('usedReviveCodes') || '[]');

function getUniqueQuestion() {
  let available = [];
  for (let i = 0; i < BANK.length; i++) if (!usedIndexSet.has(i)) available.push(i);
  if (available.length === 0) return null;
  let idx = available[Math.floor(Math.random() * available.length)];
  usedIndexSet.add(idx);
  return BANK[idx];
}
function updateTimeTip() {
  const pi = getPeriodInfo();
  $('timeInfo').innerText = pi.allowed ? pi.periodName : '当前非比赛开放时间';
}

function login() {
  userName = $('username').value.trim();
  let pwd = $('pwd').value.trim();
  let code = $('reviveCode').value.trim();
  $('tip').innerText = "";
  if (!userName) return $('tip').innerText = "请输入昵称";
  if (!pwd) return $('tip').innerText = "请输入密码";
  if (pwd === ADMIN_PWD) {
    $('loginBox').style.display = "none";
    $('adminBox').style.display = "block";
    return;
  }
  const pi = getPeriodInfo();
  currentPeriod = pi.periodName;
  if (pwd in RACE_FIXED) {
    if (!pi.allowed) return $('tip').innerText = "当前非比赛时间";
    if (usedAccounts[pwd]) return $('tip').innerText = "该比赛账号已使用";
    isRace = true; usedAccounts[pwd] = true;
    localStorage.setItem('usedRaceAccounts', JSON.stringify(usedAccounts));
    life = 1; startGame(); return;
  }
  if (RACE_FREE.includes(pwd)) {
    if (!pi.allowed) return $('tip').innerText = "当前非比赛时间";
    isRace = true; life = 1; startGame(); return;
  }
  if (pwd in OLD_PASSWORDS || pwd in UNLIMITED_PASS) {
    isRace = false; life = 0;
    if (code) {
      if (code === UNLIMITED_CODE) life = 1;
      else if (SINGLE_USE_CODES.has(code) && !usedReviveCodes.includes(code)) {
        usedReviveCodes.push(code);
        localStorage.setItem('usedReviveCodes', JSON.stringify(usedReviveCodes));
        life = 1;
      } else return $('tip').innerText = "复活卡无效或已使用";
    }
    startGame(); return;
  }
  $('tip').innerText = "密码错误";
}

function startGame() {
  $('loginBox').style.display = "none";
  $('gameBox').style.display = "flex";
  gameOver = false; usedIndexSet.clear();
  normalCorrect = 0; timeCorrect = 0;
  normalIndex = 0; timeIndex = 0;
  totalTime = 120; decay = 1.0; wrongCount = 0;
  loadNormal(); loadTime(); startTimeLoop();
}

function loadNormal() {
  normalQ = getUniqueQuestion();
  if (!normalQ) return endGame("题库已空");
  normalIndex++; $('normalNum').innerText = normalIndex;
  $('normalQ').innerText = normalQ.q;
  $('lifeTip').innerText = `复活卡：${life}`;
  let ops = document.querySelectorAll('#gameBox .panel:first-child .option');
  ops.forEach((o,i)=>{ o.innerText = normalQ.o[i]; o.classList.remove("right","wrong","mask"); });
}
function chooseNormal(i) {
  if (gameOver) return;
  let ops = document.querySelectorAll('#gameBox .panel:first-child .option');
  ops.forEach(o=>o.classList.add("mask"));
  let ok = i === normalQ.a;
  if (ok) {
    ops[i].classList.add("right"); normalCorrect++;
    if (normalCorrect >= 12) { setTimeout(()=>endGame("恭喜通关！左边答对12题"),800); return; }
    setTimeout(loadNormal,800);
  } else {
    ops[i].classList.add("wrong"); ops[normalQ.a].classList.add("right");
    if (life>0) { life--; setTimeout(()=>{ usedIndexSet.delete([...usedIndexSet].pop()); loadNormal(); },800); }
    else setTimeout(()=>endGame("正常答题失败"),800);
  }
}

function loadTime() {
  timeQ = getUniqueQuestion();
  if (!timeQ) return endGame("题库已空");
  timeIndex++; $('timeQ').innerText = timeQ.q;
  let ops = document.querySelectorAll('#gameBox .panel:last-child .option');
  ops.forEach((o,i)=>{ o.innerText = timeQ.o[i]; o.classList.remove("right","wrong","mask"); });
  updateTimeUI();
}
function startTimeLoop() {
  clearInterval(timeLoop);
  timeLoop = setInterval(()=>{
    if (gameOver) return;
    totalTime -= decay;
    decay = Math.round((decay + 0.1)*10)/10;
    if (totalTime <= 0) { totalTime = 0; endGame("时间耗尽"); }
    updateTimeUI();
  },1000);
}
function updateTimeUI() {
  $('totalTime').innerText = totalTime.toFixed(1);
  $('decayVal').innerText = decay.toFixed(1);
  $('timeBar').style.width = (totalTime/120*100) + "%";
}
function chooseTime(i) {
  if (gameOver) return;
  let ops = document.querySelectorAll('#gameBox .panel:last-child .option');
  ops.forEach(o=>o.classList.add("mask"));
  let ok = i === timeQ.a;
  if (ok) {
    ops[i].classList.add("right"); timeCorrect++;
    decay = wrongCount + 1;
  } else {
    ops[i].classList.add("wrong"); ops[timeQ.a].classList.add("right");
    wrongCount++;
    decay = wrongCount + 1;
  }
  setTimeout(loadTime, 800);
}

function endGame(msg) {
  gameOver = true; clearInterval(timeLoop);
  $('gameBox').style.display = "none";
  $('endBox').style.display = "block";
  $('endTitle').innerText = msg;
  $('endName').innerText = userName;
  $('endNormal').innerText = normalCorrect;
  $('endTime').innerText = timeCorrect;
  $('endPeriod').innerText = currentPeriod || "非比赛场";
  $('endFinal').innerText = msg.includes("恭喜通关") ? "百币英雄通关成功！" : "再接再厉";
}
function backToLogin() {
  clearInterval(timeLoop); gameOver = true;
  $('loginBox').style.display = "block";
  $('gameBox').style.display = "none";
  $('endBox').style.display = "none";
  $('adminBox').style.display = "none";
}

$('themeTitle').innerText = "本周主题：" + WEEK_THEME;
$('themeDesc').innerText = WEEK_DESC;
updateTimeTip();
</script>
</body>
