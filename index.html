function fmtDate(d) {
  const year = d.getFullYear();
  const month = String(d.getMonth()+1).padStart(2,'0');
  const date = String(d.getDate()).padStart(2,'0');
  const w = ['日','一','二','三','四','五','六'][d.getDay()];
  return `${year}年${month}月${date}日 周${w}`;
}

function getPeriodInfo() {
  const now = new Date();
  const day = now.getDay();
  const h = now.getHours();
  const dateStr = fmtDate(now);
  let allowed = false, periodName = '';
  if(day === 5){
    if(h >= 6 && h < 20){ allowed = true; periodName = `${dateStr} 06:00~20:00场`; }
    if(h >=20 && h <24){ allowed = true; periodName = `${dateStr} 20:00~24:00场`; }
  }

    if(h >=8 && h <12){ allowed = true; periodName = `${dateStr} 08:00~12:00场`; }

    if(h >=20 && h <24){ allowed = true; periodName = `${dateStr} 20:00~24:00场`; }
  }
  return { allowed, periodName };
}

// ====================== 全局状态 ======================
const $ = id => document.getElementById(id);
let userName = "";
let isRace = false;
let currentPeriod = "";
let life = 1;

let usedQuestions = new Set();
let normalQ = null;
let timeQ = null;
let normalCorrect = 0;
let timeCorrect = 0;
let normalIndex = 0;  // 左侧独立题号
let timeIndex = 0;    // 右侧独立题号
let gameOver = false;

let totalTime = 120;
let decay = 1.00;
let timeLoop = null;

let usedAccounts = JSON.parse(localStorage.getItem('usedRaceAccounts') || '{}');
let usedReviveCodes = JSON.parse(localStorage.getItem('usedReviveCodes') || '[]');

// ====================== 工具 ======================
function getUniqueQuestion() {
  let list = BANK.filter(q => !usedQuestions.has(q));
  if (!list.length) return null;
  let q = list[Math.floor(Math.random()*list.length)];
  usedQuestions.add(q);
  return q;
}

function updateTimeTip() {
  const pi = getPeriodInfo();
  if (pi.allowed) {
    $('timeInfo').innerText = pi.periodName;
  } else {
    $('timeInfo').innerText = '当前非比赛开放时间';
  }
}

// ====================== 登录 ======================
function login() {
  userName = $('username').value.trim();
  let pwd = $('pwd').value.trim();
  let code = $('reviveCode').value.trim();
  $('tip').innerText = "";

  if (!userName) return $('tip').innerText = "请输入昵称";
  if (!pwd) return $('tip').innerText = "请输入密码";

  if (pwd === ADMIN_PWD) {
    $('loginBox').style.display = "none";
    $('adminBox').style.display = "block";
    return;
  }

  const pi = getPeriodInfo();
  currentPeriod = pi.periodName;

  if (pwd in RACE_FIXED) {
    if (!pi.allowed) return $('tip').innerText = "当前非比赛时间";
    if (usedAccounts[pwd]) return $('tip').innerText = "该比赛账号已使用";
    isRace = true;
    usedAccounts[pwd] = true;
    localStorage.setItem('usedRaceAccounts', JSON.stringify(usedAccounts));
    life = 1;
    startGame();
    return;
  }

  if (RACE_FREE.includes(pwd)) {
    if (!pi.allowed) return $('tip').innerText = "当前非比赛时间";
    isRace = true;
    life = 1;
    startGame();
    return;
  }

  if (pwd in OLD_PASSWORDS || pwd in UNLIMITED_PASS) {
    isRace = false;
    life = 0;
    if (code) {
      if (code === UNLIMITED_CODE) {
        life = 1;
      } else if (SINGLE_USE_CODES.has(code) && !usedReviveCodes.includes(code)) {
        usedReviveCodes.push(code);
        localStorage.setItem('usedReviveCodes', JSON.stringify(usedReviveCodes));
        life = 1;
      } else {
        return $('tip').innerText = "复活卡无效或已使用";
      }
    }
    startGame();
    return;
  }

  $('tip').innerText = "密码错误";
}

// ====================== 游戏 ======================
function startGame() {
  $('loginBox').style.display = "none";
  $('gameBox').style.display = "flex";
  gameOver = false;
  usedQuestions.clear();
  normalCorrect = 0;
  timeCorrect = 0;
  normalIndex = 0;
  timeIndex = 0;

  totalTime = 120;
  decay = 1.00;
  loadNormal();
  loadTime();
  startTimeLoop();
}

// 左侧正常答题
function loadNormal() {
  normalQ = getUniqueQuestion();
  if (!normalQ) return endGame("全部题目完成");
  normalIndex++;
  $('normalNum').innerText = normalIndex;
  $('normalQ').innerText = normalQ.q;
  $('lifeTip').innerText = `复活卡：${life}`;
  let ops = document.querySelectorAll('#gameBox .panel:first-child .option');
  ops.forEach((o,i) => {
    o.innerText = normalQ.o[i];
    o.classList.remove("right","wrong","mask");
  });
}

function chooseNormal(i) {
  if (gameOver) return;
  let ops = document.querySelectorAll('#gameBox .panel:first-child .option');
  ops.forEach(o=>o.classList.add("mask"));
  let ok = i === normalQ.a;

  if (ok) {
    ops[i].classList.add("right");
    normalCorrect++;
    setTimeout(loadNormal, 800);
  } else {
    ops[i].classList.add("wrong");
    ops[normalQ.a].classList.add("right");
    if (life > 0) {
      life--;
      setTimeout(loadNormal, 800);
    } else {
      setTimeout(()=>endGame("正常答题失败"), 800);
    }
  }
}

// 右侧时间竞速
function loadTime() {
  timeQ = getUniqueQuestion();
  if (!timeQ) return endGame("全部题目完成");
  timeIndex++;
  $('timeQ').innerText = timeQ.q;
  let ops = document.querySelectorAll('#gameBox .panel:last-child .option');
  ops.forEach((o,i) => {
    o.innerText = timeQ.o[i];
    o.classList.remove("right","wrong","mask");
  });
  updateTimeUI();
}

function startTimeLoop() {
  clearInterval(timeLoop);
  timeLoop = setInterval(()=>{
    if (gameOver) return;
    totalTime -= decay;
    decay = Math.round((decay + 0.01)*100)/100;
    if (totalTime <= 0) {
      totalTime = 0;
      endGame("时间耗尽");
    }
    updateTimeUI();
  }, 1000);
}

function updateTimeUI() {
  $('totalTime').innerText = totalTime.toFixed(1);
  $('decayVal').innerText = decay.toFixed(2);
  $('timeBar').style.width = (totalTime/120*100)+"%";
}

function chooseTime(i) {
  if (gameOver) return;
  let ops = document.querySelectorAll('#gameBox .panel:last-child .option');
  ops.forEach(o=>o.classList.add("mask"));
  let ok = i === timeQ.a;

  if (ok) {
    ops[i].classList.add("right");
    timeCorrect++;
    decay = 1.00;
  } else {
    ops[i].classList.add("wrong");
    ops[timeQ.a].classList.add("right");
    decay = 2.00;
  }
  setTimeout(loadTime, 800);
}

// 结束
function endGame(msg) {
  gameOver = true;
  clearInterval(timeLoop);
  $('gameBox').style.display = "none";
  $('endBox').style.display = "block";
  $('endTitle').innerText = msg;
  $('endName').innerText = userName;
  $('endNormal').innerText = normalCorrect;
  $('endTime').innerText = timeCorrect;
  $('endPeriod').innerText = currentPeriod || "非比赛场";
  let total = normalCorrect + timeCorrect;
  $('endFinal').innerText = total >= 22 ? "脑裂通关！" : "再接再厉";
}

// 返回
function backToLogin() {
  clearInterval(timeLoop);
  gameOver = true;
  $('loginBox').style.display = "block";
  $('gameBox').style.display = "none";
  $('endBox').style.display = "none";
  $('adminBox').style.display = "none";
}

// 初始化
$('themeTitle').innerText = "本周主题：" + WEEK_THEME;
$('themeDesc').innerText = WEEK_DESC;
updateTimeTip();
</script>
